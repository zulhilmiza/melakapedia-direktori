  <style>
    /* ── Tokens — Melakapedia v4 editorial coastal system ─────────────────── */
    :root {
      --bone:      #F2ECE0;
      --bone-2:    #E9E1D0;
      --paper:     #FBF7EE;
      --ink:       #171614;
      --ink-2:     #2A2825;
      --ink-mute:  #6E6A60;
      --rule:      rgba(23,22,20,0.14);
      --rule-soft: rgba(23,22,20,0.08);
      --sea:       #1F3D3A;
      --sea-ink:   #15302D;
      --clay:      #B85C3C;
      --clay-ink:  #9D4A2E;
      --sand:      #E8C9A8;
      --serif: "Instrument Serif", "Cormorant Garamond", "Times New Roman", serif;
      --sans:  "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono:  "Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --r-sm: 2px;
      --r-md: 4px;
      --topbar-h: 54px;
    }

    /* ── Reset / base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bone-2);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; text-align: left; }
    h1, h2, h3, p, ul, figure { margin: 0; padding: 0; }
    ul { list-style: none; }
    button, a { -webkit-tap-highlight-color: transparent; }
    :focus-visible { outline: 2px solid var(--sea); outline-offset: 3px; }

    /* ── Frame (mobile-first column) ──────────────────────────────────── */
    .frame {
      max-width: 460px;
      margin: 0 auto;
      min-height: 100svh;
      background: var(--bone);
      position: relative;
    }
    @media (min-width: 520px) {
      .frame {
        border-inline: 1px solid var(--rule-soft);
        box-shadow: 0 0 80px rgba(23,22,20,0.10);
      }
    }

    .screen { animation: fadeUp .4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .screen { animation: none; }
      .card__media img, .gallery-grid img { transition: none !important; }
    }

    /* ── Typography helpers ───────────────────────────────────────────── */
    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .eyebrow .dot { width: 5px; height: 5px; background: var(--clay); border-radius: 50%; flex: 0 0 auto; }
    .mono-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 20px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: 1px solid currentColor;
      border-radius: 999px;
      transition: background-color .2s ease, color .2s ease, border-color .2s ease;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn--clay { background: var(--clay); color: var(--paper); border-color: var(--clay); }
    .btn--clay:active, .btn--clay:hover { background: var(--clay-ink); border-color: var(--clay-ink); }
    .btn--sea { background: var(--sea); color: var(--paper); border-color: var(--sea); }
    .btn--sea:active, .btn--sea:hover { background: var(--sea-ink); border-color: var(--sea-ink); }
    .btn--ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
    .btn--ghost:active, .btn--ghost:hover { background: var(--ink); color: var(--paper); }

    /* ── QR landing ───────────────────────────────────────────────────── */
    .qr-screen {
      min-height: 100svh;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      padding: 24px 24px calc(28px + env(safe-area-inset-bottom));
    }
    .qr-screen__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }
    .qr-screen__brand { font-family: var(--serif); font-size: 22px; letter-spacing: -0.01em; }
    .brand-logo-img { display: block; width: auto; object-fit: contain; }
    .qr-screen__logo { height: 42px; max-width: 190px; }
    .topbar__logo { height: 38px; max-width: 176px; }
    .qr-screen__head .mono-label { color: rgba(255,255,255,0.55); }
    .qr-screen__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 26px;
      padding: 36px 0 28px;
    }
    .qr-screen__eyebrow { color: rgba(255,255,255,0.6); }
    .qr-screen__title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(38px, 11vw, 48px);
      line-height: 1.04;
      letter-spacing: -0.015em;
      text-wrap: balance;
    }
    .qr-screen__title em { font-style: italic; color: var(--sand); }
    .qr-screen__sub { color: rgba(255,255,255,0.72); font-size: 15px; line-height: 1.55; max-width: 34ch; }
    .qr-plate {
      background: var(--paper);
      border-radius: var(--r-md);
      padding: 16px;
      width: 168px;
    }
    .qr-plate__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .qr-plate__grid span { aspect-ratio: 1; border-radius: 1px; }
    .qr-plate__cap {
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-mute);
      text-align: center;
    }
    .qr-screen__foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.18);
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── Top bar ──────────────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 20px;
      background: rgba(242,236,224,0.88);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule-soft);
    }
    .topbar__brand { display: flex; flex-direction: column; line-height: 1.05; }
    .topbar__brand .name { font-family: var(--serif); font-size: 19px; letter-spacing: -0.01em; }
    .topbar__brand .sub {
      font-family: var(--mono);
      font-size: 8.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-top: 1px;
    }

    /* ── Directory header + tabs ──────────────────────────────────────── */
    .dir-head { padding: 26px 20px 18px; }
    .dir-head h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(32px, 9vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.012em;
      margin: 10px 0 8px;
    }
    .dir-head p { color: var(--ink-2); font-size: 14.5px; line-height: 1.5; max-width: 40ch; }

    .tabs {
      position: sticky;
      top: var(--topbar-h);
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 20px 12px;
      background: rgba(242,236,224,0.88);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule-soft);
    }
    .tab {
      padding: 10px 4px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-align: center;
      color: var(--ink-2);
      background: transparent;
      transition: background-color .2s ease, color .2s ease, border-color .2s ease;
    }
    .tab.is-active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* ── Listing cards ────────────────────────────────────────────────── */
    .cards { padding: 18px 18px 10px; display: flex; flex-direction: column; gap: 18px; }
    .cards--paged { padding-bottom: 10px; }
    .card {
      display: block;
      width: 100%;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--rule-soft);
      border-radius: 24px;
      box-shadow: 0 16px 34px rgba(33,50,58,0.10);
    }
    .card__media {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #E7F0EF;
    }
    .card__media img { width: 100%; height: 100%; object-fit: cover; transition: transform .8s ease; }
    .card:active .card__media img { transform: scale(1.02); }
    .card__index {
      position: absolute;
      top: 12px; left: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      min-height: 36px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(28,39,48,0.88);
      color: #fff;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1;
    }
    .card__badge {
      position: absolute;
      top: 12px; right: 12px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: none;
      background: rgba(0,169,120,0.92);
      color: #fff;
      padding: 6px 9px;
      border-radius: 999px;
    }
    .card__temp {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: calc(100% - 24px);
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--ink-2);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }
    .card__body { padding: 16px 16px 15px; }
    .card__name {
      font-family: var(--sans);
      font-weight: 950;
      font-size: 22px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .card__area {
      margin-top: 5px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 750;
      letter-spacing: 0;
      text-transform: none;
      color: var(--ink-mute);
    }
    .card__meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }
    .status-chip--verified { background: #EAF8F4; color: var(--sea-ink); }
    .status-chip--draft { background: #FFF7E6; color: #7B5B12; }
    .status-chip--demo { background: #EEF4FF; color: #255FA8; }
    .status-chip--temp { background: #F2F5F5; color: var(--ink-mute); }
    .status-chip--info { background: #F2F5F5; color: var(--ink-2); }
    .card__tagline { margin-top: 7px; color: var(--ink-2); font-size: 13.5px; line-height: 1.5; }
    .card__foot {
      margin-top: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card__price {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      min-width: 0;
      padding: 7px 10px;
      border-radius: 13px;
      background: #EAF8F4;
      color: var(--sea-ink);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1.05;
    }
    .card__price small {
      color: var(--ink-mute);
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
    }
    .card__more {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 13px;
      background: var(--sea);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 0 0 auto;
    }
    .card__more .arrow { transition: transform .25s ease; }
    .card:hover .card__more .arrow { transform: translateX(3px); }
    .pagination {
      padding: 4px 20px 112px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 10px;
    }
    .page-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      color: var(--paper);
      font-size: 20px;
      font-weight: 700;
    }
    .page-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .page-count {
      min-height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.68);
      color: var(--ink-2);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    /* ── Detail screen ────────────────────────────────────────────────── */
    .hero {
      position: relative;
      aspect-ratio: 4 / 3;
      background: var(--ink);
      overflow: hidden;
    }
    .hero img { width: 100%; height: 100%; object-fit: cover; }
    .hero::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.10) 60%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }
    .hero__back {
      position: absolute;
      top: 14px; left: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--paper);
      color: var(--ink);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .hero__overlay { position: absolute; left: 18px; right: 18px; bottom: 16px; z-index: 1; color: var(--paper); }
    .hero__badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: var(--clay);
      color: var(--paper);
      padding: 5px 10px;
      border-radius: 999px;
      margin-bottom: 9px;
    }
    .hero__name {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(28px, 8vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.012em;
    }
    .hero__tagline { margin-top: 6px; font-size: 13.5px; line-height: 1.45; color: rgba(255,255,255,0.85); max-width: 38ch; }
    .detail-back-wrap {
      position: fixed;
      top: calc(var(--topbar-h) + 10px);
      left: max(14px, calc((100vw - 460px) / 2 + 14px));
      z-index: 90;
      pointer-events: none;
    }
    .detail-back {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 0 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(23,22,20,0.14);
      font-size: 13px;
      font-weight: 700;
    }

    .detail-body { padding: 6px 20px 0; }

    /* Editorial info rows */
    .info-list { margin-top: 14px; }
    .info-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: baseline;
      padding: 13px 0;
      border-bottom: 1px solid var(--rule-soft);
    }
    .info-row .v { font-size: 14px; color: var(--ink); line-height: 1.45; }

    .maps-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid var(--rule-soft);
    }
    .maps-row .t { font-family: var(--serif); font-size: 18px; letter-spacing: -0.005em; margin-top: 3px; }
    .maps-row .go {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--sea);
      border: 1px solid var(--sea);
      border-radius: 999px;
      padding: 8px 13px;
      white-space: nowrap;
    }

    .social-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 4px; }
    .social-row a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-2);
    }
    .social-row a:active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* Sections */
    .dsection { margin-top: 30px; }
    .dsection__head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 4px;
    }
    .dsection__title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 23px;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    /* Rooms */
    .room-item { padding: 16px 0; border-bottom: 1px solid var(--rule-soft); }
    .room-item__main { display: grid; grid-template-columns: 92px 1fr; gap: 14px; align-items: start; }
    .room-item__thumb {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      padding: 0;
      border: 0;
      border-radius: var(--r-sm);
      background: var(--bone-2);
      cursor: zoom-in;
    }
    .room-item__thumb img { width: 100%; height: 100%; object-fit: cover; }
    .room-item__thumb:focus-visible { outline: 3px solid rgba(0,168,122,0.38); outline-offset: 3px; }
    .room-item__head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .room-item__name { font-family: var(--serif); font-size: 19px; letter-spacing: -0.005em; line-height: 1.15; }
    .room-item__price { text-align: right; white-space: nowrap; }
    .room-item__price .amount { font-family: var(--serif); font-size: 19px; letter-spacing: -0.005em; }
    .room-item__price .amount .currency { font-size: 0.6em; vertical-align: 0.35em; margin-right: 1px; color: var(--ink-mute); }
    .room-item__price .note {
      display: block;
      font-family: var(--mono);
      font-size: 8.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-top: 3px;
    }
    .room-item__cap { margin-top: 4px; font-size: 12.5px; color: var(--ink-2); line-height: 1.45; }
    .room-item__extra { margin-top: 2px; font-size: 12px; color: var(--ink-mute); }
    .rates {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(55px, 1fr));
      border-top: 1px solid var(--rule-soft);
    }
    .rates > div { padding: 9px 8px 0 0; }
    .rates .l {
      display: block;
      font-family: var(--mono);
      font-size: 8.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 2px;
    }
    .rates .v { font-size: 14px; color: var(--ink); }

    /* Menu */
    .menu-item {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 14px;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--rule-soft);
    }
    .menu-item__thumb { aspect-ratio: 1; overflow: hidden; border-radius: var(--r-sm); background: var(--bone-2); }
    .menu-item__thumb img { width: 100%; height: 100%; object-fit: cover; }
    .menu-item__name { font-family: var(--serif); font-size: 18px; letter-spacing: -0.005em; line-height: 1.15; }
    .menu-item__detail { margin-top: 3px; font-size: 12.5px; color: var(--ink-mute); line-height: 1.45; }

    /* Dash lists (highlights / facilities) */
    .dash-list { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 20px; padding-top: 12px; }
    .dash-list li {
      font-size: 13.5px;
      color: var(--ink-2);
      display: flex;
      gap: 10px;
      align-items: baseline;
      line-height: 1.4;
    }
    .dash-list li::before {
      content: "";
      width: 14px;
      height: 1px;
      background: var(--clay);
      flex: 0 0 auto;
      transform: translateY(-4px);
    }

    /* Gallery */
    .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 14px; }
    .gallery-grid button {
      overflow: hidden;
      border-radius: var(--r-sm);
      background: var(--bone-2);
      aspect-ratio: 1;
      padding: 0;
    }
    .gallery-grid button:first-child { grid-column: span 2; aspect-ratio: 16 / 10; }
    .gallery-grid img { width: 100%; height: 100%; object-fit: cover; transition: transform .8s ease; }
    .gallery-grid button:active img { transform: scale(1.03); }

    /* Notes */
    .notes {
      margin-top: 30px;
      background: var(--paper);
      border: 1px solid var(--rule-soft);
      border-radius: var(--r-md);
      padding: 15px 16px;
    }
    .notes p { font-size: 12.5px; line-height: 1.55; color: var(--ink-mute); }
    .notes p + p { margin-top: 6px; }

    /* Sticky actions */
    .actions {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 460px;
      z-index: 50;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: rgba(251,247,238,0.92);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--rule-soft);
    }
    .detail-pad { padding-bottom: 96px; }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(23,22,20,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: lbIn .25s ease both;
    }
    @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox img { max-width: 100%; max-height: 78svh; object-fit: contain; border-radius: var(--r-sm); }
    .lightbox__close {
      position: absolute;
      top: 18px; right: 18px;
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .lightbox__nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px; height: 42px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .lightbox__nav--prev { left: 14px; }
    .lightbox__nav--next { right: 14px; }
    .lightbox__count {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.7);
    }

    /* Footer */
    .footer {
      margin-top: 36px;
      padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--rule-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .footer a { border-bottom: 1px solid var(--rule); padding-bottom: 2px; }

    /* App-style refresh inspired by the travel mockup */
    :root {
      --bone: #E8F4F3;
      --bone-2: #D7E9E7;
      --paper: #FFFFFF;
      --ink: #21323A;
      --ink-2: #51666D;
      --ink-mute: #8BA0A4;
      --rule: rgba(33,50,58,0.12);
      --rule-soft: rgba(33,50,58,0.08);
      --sea: #00A978;
      --sea-ink: #04785E;
      --clay: #2F80ED;
      --clay-ink: #1E5FB6;
      --sand: #FFD166;
      --serif: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --sans: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --r-sm: 14px;
      --r-md: 18px;
      --topbar-h: 66px;
      --shadow: 0 18px 40px rgba(33,50,58,0.13);
    }
    body {

    .frame {

        max-width: none;

    .mono-label {

      color: var(--ink-mute);

    .eyebrow {

    .btn {

    .btn--clay, .btn--sea { background: var(--sea); color: #fff; }
    .btn--clay:active, .btn--clay:hover, .btn--sea:active, .btn--sea:hover { background: var(--sea-ink); }
    .btn--ghost {

    .qr-screen {

        linear-gradient(180deg, rgba(232,244,243,0.92), rgba(255,255,255,0.98)),

    .qr-screen__eyebrow { color: var(--sea-ink); }

    .qr-plate {

    .topbar {

    .icon-btn {

    .tabs {

    }
    .search-box {

    }
    .search-box input {
      width: 100%;

    .search-box__icon {

    .tools-line {

    .sort-select {

      background-position: calc(100% - 17px) 16px, calc(100% - 12px) 16px;
      background-size: 5px 5px, 5px 5px;

    .result-summary {

    .reset-btn {

    .stay-filters {

    .filter-chip {

    .pagination {

    .page-btn {

    .detail-back {

    .hero {

      const [stayFilter, setStayFilter] = useState("all");

      const [sortBy, setSortBy] = useState("featured");
      const [page, setPage] = useState(1);
      const cat = CATEGORIES.find((entry) => entry.id === activeCategory) || CATEGORIES[0];
      const items = listings && listings[activeCategory] || [];
      useEffect(() => {
        if (activeCategory !== "penginapan") {
          setStayFilter("all");
          setAreaFilter("all");
        }
      }, [activeCategory]);
      useEffect(() => {
        setPage(1);
      }, [activeCategory, stayFilter, areaFilter, searchTerm, sortBy]);
      const typedSearch = searchTerm.trim().toLowerCase();
      const filteredItems = activeCategory === "penginapan" && stayFilter !== "all"
        ? items.filter((item) => getStayType(item) === stayFilter)
        : items;
      const areaItems = activeCategory === "penginapan" && areaFilter !== "all"

        : filteredItems;
      const searchedItems = typedSearch
        ? areaItems.filter((item) => getSearchText(item).includes(typedSearch))
        : areaItems;
      const visibleItems = activeCategory === "penginapan"
        ? sortListings(searchedItems, sortBy)
        : fairOrder(searchedItems);
      const shouldPaginate = activeCategory === "penginapan" && visibleItems.length > PAGE_SIZE;
      const totalPages = shouldPaginate ? Math.ceil(visibleItems.length / PAGE_SIZE) : 1;
      const currentPage = Math.min(page, totalPages);
      const pageStart = shouldPaginate ? (currentPage - 1) * PAGE_SIZE : 0;
      const pageItems = shouldPaginate ? visibleItems.slice(pageStart, pageStart + PAGE_SIZE) : visibleItems;
      const pageEnd = shouldPaginate ? Math.min(pageStart + pageItems.length, visibleItems.length) : visibleItems.length;

    function App() {
      const [screen, setScreen] = useState("directory");
      const [activeCategory, setActiveCategory] = useState("penginapan");
      const [selected, setSelected] = useState(null);
      const [listings, setListings] = useState(LISTINGS);
      useEffect(() => {
        let alive = true;
        const loadListings = async () => {
          try {
            const liveResponse = await fetch("/api/listings", { cache: "no-store" });
            if (liveResponse.ok) {
              const payload = await liveResponse.json();
              if (payload && payload.listings) {
                if (alive) setListings(normalizeListings(payload.listings));
                return;
              }
            }
          } catch (_) {
          }

          try {
            const response = await fetch("data/listings.json", { cache: "no-store" });
            if (!response.ok) throw new Error("Data not found");
            const data = await response.json();
            if (alive) setListings(normalizeListings(data));
          } catch (_) {
          }
        };
        loadListings();
        return () => {
          alive = false;
        };
      }, []);
      useEffect(() => {
        const onPop = () => {
          setSelected(null);
          setScreen((current) => current === "detail" ? "directory" : current);
          requestAnimationFrame(() => window.scrollTo(0, 0));
        };
        window.addEventListener("popstate", onPop);
        return () => window.removeEventListener("popstate", onPop);
      }, []);
      const jumpTop = () => requestAnimationFrame(() => window.scrollTo(0, 0));
      const openDirectory = () => {
        setSelected(null);
        setScreen("directory");
        jumpTop();
      };
      const openDemo = () => {
        setSelected(null);
        setScreen("qr");
        jumpTop();
      };
      const closeDetail = () => {
        if (window.history.state && window.history.state.melakapediaDetail) {
          window.history.back();
        } else {
          openDirectory();
        }
      };
      const openHome = () => {
        setSelected(null);
        setActiveCategory("penginapan");
        setScreen("directory");
        jumpTop();
      };
      const changeCategory = (category) => {
        setActiveCategory(category);
        jumpTop();
      };
      return h("main", { className: "frame" },
        screen === "qr" && h(QRScreen, { onScan: openDirectory }),
        screen === "directory" && h(DirectoryScreen, {
          activeCategory,
          listings,
          onDemo: openDemo,
          setActiveCategory: changeCategory,
          onSelect: (item) => {
            setSelected(item);
            setScreen("detail");
            window.history.pushState({ melakapediaDetail: true }, "");
            jumpTop();
          }
        }),
        screen === "detail" && selected && h(DetailScreen, {
          item: selected,
          onBack: closeDetail,
          onHome: openHome,
          onDemo: openDemo
        })
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
  })();
  </script>
</body>
</html>
